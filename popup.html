<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Febbox Token Extractor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: monospace;
      font-size: 13px;
      padding: 14px 16px 16px;
    }

    #title {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #cookieOutput {
      width: 100%;
      height: 72px;
      resize: none;
      background: #313244;
      color: #a6e3a1;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 5px;
      font-size: 11px;
      font-family: monospace;
      display: block;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    button {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }

    #getCookies {
      background: #89b4fa;
      color: #1e1e2e;
    }

    #copyBtn {
      background: #a6e3a1;
      color: #1e1e2e;
    }

    #getCookies:hover { background: #74a0e8; }
    #copyBtn:hover    { background: #8fd49b; }
  </style>
</head>
<body>
  <div id="title">🔑 Febbox Token</div>
  <textarea id="cookieOutput" readonly placeholder="Click 'Get Token' to extract…"></textarea>
  <div class="btn-row">
    <button id="getCookies">Get Token</button>
    <button id="copyBtn">Copy</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
